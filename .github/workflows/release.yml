name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (tag must already exist). Recommended to use vX.Y.Z.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build-release:
    name: Build Release Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_suffix: ''
            archive: tar.gz
            needs_musl: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_suffix: ''
            archive: tar.gz
            needs_musl: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_suffix: ''
            archive: tar.gz
            needs_musl: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_suffix: ''
            archive: tar.gz
            needs_musl: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: '.exe'
            archive: tar.gz
            needs_musl: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.needs_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/rustow${{ matrix.binary_suffix }}" staging/
          cp README.md LICENSE staging/
          tar -czf "rustow-${RELEASE_TAG}-${{ matrix.target }}.${{ matrix.archive }}" -C staging .

      - name: Upload artifact for publish
        uses: actions/upload-artifact@v4
        with:
          name: rustow-release-${{ matrix.target }}
          path: rustow-${RELEASE_TAG}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag != '' }}
    steps:
      - name: Validate release tag
        run: |
          if [[ "${RELEASE_TAG}" != v* ]]; then
            echo "Invalid RELEASE_TAG: ${RELEASE_TAG}. Use a tag like v1.2.3."
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rustow-release-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sum_file="rustow-${RELEASE_TAG}-sha256sums.txt"
          : > "$sum_file"
          while IFS= read -r file; do
            sha256sum "$file" >> "$sum_file"
          done < <(find . -maxdepth 1 -name '*.tar.gz' -print | sort)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
